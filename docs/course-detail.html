<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail du Cours — EduMind AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top"><div class="container-fluid px-4"><a class="navbar-brand" href="index.html"><i class="fas fa-brain me-2"></i>EduMind AI</a><div class="avatar" style="background:linear-gradient(135deg,var(--primary),var(--secondary))">NM</div></div></nav>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div style="padding:0 24px 20px;border-bottom:1px solid var(--glass-border);margin-bottom:20px"><div style="font-size:0.75rem;text-transform:uppercase;color:var(--text-muted);letter-spacing:1px">Menu</div></div>
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="students.html" class="sidebar-link"><i class="fas fa-users"></i> Étudiants</a>
            <a href="courses.html" class="sidebar-link active"><i class="fas fa-book"></i> Cours</a>
            <a href="quiz.html" class="sidebar-link"><i class="fas fa-question-circle"></i> Quiz</a>
            <a href="index.html" class="sidebar-link"><i class="fas fa-home"></i> Accueil</a>
        </aside>
        <main class="main-content" id="course-content"></main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const courses={
        '1':{title:"Introduction à l'Intelligence Artificielle",cat:'IA & ML',color:'#6C5CE7',icon:'fas fa-brain',duration:'36h',level:'Intermédiaire',students:45,progress:75,
            desc:"Ce cours couvre les fondamentaux de l'intelligence artificielle : apprentissage supervisé, non supervisé, réseaux de neurones, arbres de décision et applications pratiques.",
            chapters:["Introduction et historique de l'IA","Apprentissage supervisé : Régression & Classification","Arbres de décision et Random Forest","Réseaux de neurones artificiels","Apprentissage non supervisé : K-Means, DBSCAN","Évaluation des modèles et métriques","Projet pratique : Système de recommandation"]},
        '2':{title:'Programmation PHP & Laravel',cat:'Développement Web',color:'#00D2FF',icon:'fab fa-php',duration:'48h',level:'Avancé',students:60,progress:88,
            desc:"Maîtrisez PHP 8 et le framework Laravel pour développer des applications web modernes, sécurisées et performantes avec architecture MVC.",
            chapters:["PHP 8 : Syntaxe moderne et POO","Architecture MVC et Design Patterns","Laravel : Installation et configuration","Eloquent ORM et migrations","Authentification et middleware","API RESTful avec Laravel","Déploiement et bonnes pratiques"]},
        '3':{title:'Bases de Données Avancées',cat:'Data Engineering',color:'#0ACF83',icon:'fas fa-database',duration:'30h',level:'Intermédiaire',students:38,progress:62,
            desc:"Approfondissez vos connaissances en bases de données relationnelles et NoSQL, optimisation des requêtes et administration.",
            chapters:["Modélisation avancée et normalisation","SQL avancé : Sous-requêtes et jointures","Indexation et optimisation des performances","Transactions et gestion de la concurrence","Introduction à MongoDB et NoSQL","Réplication et haute disponibilité","Projet : Conception d'un système complet"]},
        '4':{title:'HTML5, CSS3 & Bootstrap',cat:'Développement Web',color:'#FECA57',icon:'fab fa-html5',duration:'40h',level:'Débutant',students:55,progress:92,
            desc:"Créez des interfaces web modernes et responsive avec HTML5 sémantique, CSS3 avancé (Grid, Flexbox, animations) et Bootstrap 5.",
            chapters:["HTML5 sémantique et accessibilité","CSS3 : Flexbox et Grid Layout","Animations et transitions CSS3","Bootstrap 5 : Composants et grille","Responsive Design et Mobile First","Sass/SCSS préprocesseur","Projet : Portfolio personnel responsive"]},
        '5':{title:'Algorithmes & Structures de Données',cat:'Fondamentaux',color:'#FF6B6B',icon:'fas fa-code',duration:'36h',level:'Intermédiaire',students:50,progress:80,
            desc:"Étudiez les algorithmes fondamentaux et les structures de données essentielles pour tout développeur : tri, recherche, graphes, arbres.",
            chapters:["Complexité algorithmique (Big O)","Tableaux, listes chaînées et piles","Algorithmes de tri (Quick, Merge, Heap)","Arbres binaires et AVL","Tables de hachage","Graphes : BFS, DFS, Dijkstra","Programmation dynamique"]}
    };
    const id=new URLSearchParams(window.location.search).get('id')||'1';
    const c=courses[id]||courses['1'];
    let chapHtml='';
    c.chapters.forEach((ch,i)=>{
        const done=i<Math.floor(c.chapters.length*c.progress/100);
        chapHtml+=`<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--dark-3);border-radius:var(--radius-sm);margin-bottom:8px;border-left:3px solid ${done?c.color:'var(--glass-border)'}">
            <div style="width:32px;height:32px;border-radius:50%;background:${done?c.color+'30':'var(--dark-4)'};display:flex;align-items:center;justify-content:center;color:${done?c.color:'var(--text-muted)'};font-size:0.8rem">${done?'<i class="fas fa-check"></i>':(i+1)}</div>
            <span style="flex:1;${done?'':'color:var(--text-muted)'}">${ch}</span>
            ${done?'<span class="badge-custom badge-success" style="font-size:0.7rem">Terminé</span>':'<span class="badge-custom" style="font-size:0.7rem;background:var(--dark-4);color:var(--text-muted)">À venir</span>'}
        </div>`;
    });
    document.getElementById('course-content').innerHTML=`
        <a href="courses.html" style="color:var(--text-muted);text-decoration:none;font-size:0.9rem;display:inline-block;margin-bottom:16px"><i class="fas fa-arrow-left me-2"></i>Retour aux cours</a>
        <div class="glass-card mb-4" style="padding:0;overflow:hidden">
            <div style="height:8px;background:${c.color}"></div>
            <div style="padding:28px">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div style="width:55px;height:55px;border-radius:16px;background:${c.color}20;display:flex;align-items:center;justify-content:center;color:${c.color};font-size:1.5rem"><i class="${c.icon}"></i></div>
                    <div><span class="badge-custom" style="background:${c.color}20;color:${c.color}">${c.cat}</span><h3 style="font-weight:800;margin:6px 0 0">${c.title}</h3></div>
                </div>
                <p style="color:var(--text-muted);margin-bottom:20px">${c.desc}</p>
                <div class="row g-3">
                    <div class="col-6 col-md-3"><div style="background:var(--dark-3);border-radius:12px;padding:14px;text-align:center"><div style="font-size:1.3rem;font-weight:800;color:${c.color}">${c.duration}</div><div style="font-size:0.78rem;color:var(--text-muted)">Durée</div></div></div>
                    <div class="col-6 col-md-3"><div style="background:var(--dark-3);border-radius:12px;padding:14px;text-align:center"><div style="font-size:1.3rem;font-weight:800;color:${c.color}">${c.students}</div><div style="font-size:0.78rem;color:var(--text-muted)">Étudiants</div></div></div>
                    <div class="col-6 col-md-3"><div style="background:var(--dark-3);border-radius:12px;padding:14px;text-align:center"><div style="font-size:1.3rem;font-weight:800;color:${c.color}">${c.level}</div><div style="font-size:0.78rem;color:var(--text-muted)">Niveau</div></div></div>
                    <div class="col-6 col-md-3"><div style="background:var(--dark-3);border-radius:12px;padding:14px;text-align:center"><div style="font-size:1.3rem;font-weight:800;color:${c.color}">${c.progress}%</div><div style="font-size:0.78rem;color:var(--text-muted)">Progression</div></div></div>
                </div>
                <div style="margin-top:16px"><div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.85rem"><span>Progression globale</span><span style="font-weight:700;color:${c.color}">${c.progress}%</span></div><div class="progress-custom" style="height:10px"><div class="bar" style="width:${c.progress}%;background:${c.color}"></div></div></div>
            </div>
        </div>
        <h5 style="font-weight:700;margin-bottom:16px"><i class="fas fa-list-ol me-2" style="color:${c.color}"></i>Programme du Cours (${c.chapters.length} chapitres)</h5>
        ${chapHtml}
        <div style="text-align:center;margin-top:24px"><p style="color:var(--text-muted);font-size:0.85rem"><i class="fas fa-chalkboard-teacher me-1"></i> Enseignant : <strong>Prof. NADIR MOHAMED ANOUAR</strong></p></div>`;
    </script>
</body>
</html>
