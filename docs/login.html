<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Admin — Connexion | EduMind AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div style="text-align:center;margin-bottom:30px">
                <div style="width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--secondary));margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:white"><i class="fas fa-lock"></i></div>
                <h2>Espace Administrateur</h2>
                <p class="subtitle">Accédez au panneau d'administration</p>
            </div>
            <div id="login-error" style="display:none;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:20px;color:var(--danger);font-size:0.9rem"><i class="fas fa-exclamation-circle me-2"></i>Identifiants incorrects.</div>
            <form id="admin-login" onsubmit="return handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label-custom">Adresse Email</label>
                    <div style="position:relative"><i class="fas fa-envelope" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i><input type="email" id="admin-email" class="form-control-custom" placeholder="admin@edumind.ai" style="padding-left:44px" required></div>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">Mot de passe</label>
                    <div style="position:relative"><i class="fas fa-lock" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i><input type="password" id="admin-pass" class="form-control-custom" placeholder="••••••••" style="padding-left:44px" required></div>
                </div>
                <button type="submit" class="btn-primary-custom w-100 mb-3" style="text-align:center"><i class="fas fa-sign-in-alt me-2"></i>Se connecter</button>
                <p style="text-align:center;color:var(--text-muted);font-size:0.9rem">Vous êtes étudiant ? <a href="student-login.html" style="color:var(--accent);text-decoration:none;font-weight:600">Espace Étudiant</a></p>
            </form>
            <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--glass-border)">
                <p style="color:var(--text-muted);font-size:0.8rem;text-align:center;margin-bottom:12px">📋 Compte admin démo :</p>
                <div style="background:var(--dark-3);border-radius:var(--radius-sm);padding:12px 16px;font-size:0.85rem;color:var(--text-muted);text-align:center">
                    <strong style="color:var(--primary)">Email</strong> : admin@edumind.ai &nbsp;|&nbsp; <strong style="color:var(--primary)">Mot de passe</strong> : admin123
                </div>
            </div>
            <div style="margin-top:15px;text-align:center"><a href="index.html" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none"><i class="fas fa-arrow-left me-1"></i> Retour à l'accueil</a></div>
        </div>
    </div>
    <script>
    function handleLogin(e){e.preventDefault();
        if(document.getElementById('admin-email').value==='admin@edumind.ai'&&document.getElementById('admin-pass').value==='admin123'){
            localStorage.setItem('admin','true');window.location.href='dashboard.html';
        }else{document.getElementById('login-error').style.display='block';}return false;}
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
